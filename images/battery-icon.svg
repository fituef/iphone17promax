<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E72;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="none"/>
  <g transform="translate(50, 50)">
    <!-- Battery body -->
    <rect x="-18" y="-28" width="36" height="50" rx="2" fill="url(#batteryGrad)" stroke="white" stroke-width="2"/>
    <!-- Battery terminal -->
    <rect x="-6" y="-32" width="12" height="6" rx="1" fill="white" opacity="0.8"/>
    <!-- Battery charge level -->
    <rect x="-14" y="-22" width="28" height="36" fill="white" opacity="0.3"/>
    <!-- Charge indicator -->
    <rect x="-14" y="-22" width="28" height="28" fill="white" opacity="0.8"/>
  </g>
</svg>