<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="displayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="none"/>
  <g transform="translate(50, 50)">
    <!-- Phone frame -->
    <rect x="-22" y="-32" width="44" height="64" rx="4" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Screen -->
    <rect x="-20" y="-28" width="40" height="48" rx="3" fill="url(#displayGrad)"/>
    <!-- Notch -->
    <rect x="-8" y="-28" width="16" height="6" rx="2" fill="#333"/>
    <!-- Screen reflection -->
    <rect x="-18" y="-26" width="36" height="4" fill="white" opacity="0.3"/>
  </g>
</svg>