<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="none"/>
  <g transform="translate(50, 50)">
    <!-- Brain/AI core -->
    <circle cx="0" cy="0" r="16" fill="url(#aiGrad)"/>
    <!-- Neural connections -->
    <line x1="0" y1="-16" x2="0" y2="-24" stroke="white" stroke-width="2"/>
    <line x1="16" y1="0" x2="24" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="16" x2="0" y2="24" stroke="white" stroke-width="2"/>
    <line x1="-16" y1="0" x2="-24" y2="0" stroke="white" stroke-width="2"/>
    <!-- Connection nodes -->
    <circle cx="0" cy="-24" r="2" fill="white"/>
    <circle cx="24" cy="0" r="2" fill="white"/>
    <circle cx="0" cy="24" r="2" fill="white"/>
    <circle cx="-24" cy="0" r="2" fill="white"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>
</svg>