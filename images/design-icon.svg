<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="designGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A189A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="none"/>
  <g transform="translate(50, 50)">
    <!-- Phone body -->
    <rect x="-20" y="-30" width="40" height="60" rx="3" fill="url(#designGrad)" stroke="white" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="-17" y="-27" width="34" height="48" rx="2" fill="white" opacity="0.15"/>
    <!-- Bottom detail -->
    <line x1="-20" y1="22" x2="20" y2="22" stroke="white" stroke-width="1" opacity="0.4"/>
    <!-- Speaker dots -->
    <circle cx="-3" cy="27" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="3" cy="27" r="1.5" fill="white" opacity="0.6"/>
  </g>
</svg>