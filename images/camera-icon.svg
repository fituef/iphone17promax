<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0073e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="none"/>
  <g transform="translate(50, 50)">
    <!-- Camera body -->
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="url(#cameraGrad)"/>
    <!-- Lens -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.3"/>
    <!-- Top details -->
    <rect x="-28" y="-18" width="10" height="6" rx="1" fill="white" opacity="0.6"/>
    <rect x="18" y="-18" width="10" height="6" rx="1" fill="white" opacity="0.6"/>
  </g>
</svg>